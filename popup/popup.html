<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h3>ZehnTage</h3>
  <label for="key">Gemini API Key</label>
  <input type="password" id="key" placeholder="paste key here">
  <button id="save">Save</button>
  <p id="status"></p>
  <label for="sites">Active sites (one regex per line)</label>
  <textarea id="sites" rows="6" placeholder=".*wikipedia\.org&#10;.*docs\.google\.com&#10;.*"></textarea>
  <p id="word-count"></p>
  <script src="popup.js"></script>
</body>
</html>
